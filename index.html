<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zamir's Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Ultra-lightweight CSS - No external frameworks */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f8fafc; margin: 0; color: #1e293b; line-height: 1.4;
        }
        header { 
            background: #fff; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; 
            position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { 
            width: 36px; height: 36px; background: #2563eb; color: #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
        }
        .user-text h2 { margin: 0; font-size: 14px; font-weight: 700; }
        .user-text p { margin: 0; font-size: 11px; color: #64748b; }
        
        .tabs { 
            display: flex; background: #fff; border-bottom: 1px solid #e2e8f0; 
            position: sticky; top: 61px; z-index: 9;
        }
        .tab { 
            flex: 1; text-align: center; padding: 12px; font-size: 13px; font-weight: 600; 
            color: #64748b; border-bottom: 2px solid transparent; cursor: pointer;
        }
        .tab.active { color: #2563eb; border-bottom-color: #2563eb; background: #eff6ff; }

        main { padding: 12px; max-width: 600px; margin: 0 auto; }
        
        .ticket-card { 
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; 
            padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .ticket-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .ticket-id { font-family: monospace; font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .status-badge { 
            font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; 
            text-transform: uppercase; border: 1px solid;
        }
        .status-inprogress { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .status-dispatched { background: #fef9ee; color: #92400e; border-color: #fef3c7; }
        .status-resolved { background: #ecfdf5; color: #065f46; border-color: #d1fae5; }
        
        .store-name { font-size: 15px; font-weight: 700; margin: 0 0 4px 0; }
        .desc { font-size: 13px; color: #475569; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #94a3b8; }
        .priority { display: flex; align-items: center; gap: 4px; font-weight: 600; }
        .priority-emergency { color: #dc2626; }
        .priority-urgent { color: #ea580c; }
        
        .loader-container { display: flex; flex-direction: column; align-items: center; padding: 40px 0; color: #94a3b8; font-size: 13px; }
        .spinner { 
            width: 20px; height: 20px; border: 2px solid #e2e8f0; border-top-color: #2563eb; 
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .hidden { display: none; }

        /* Modal - Simple Overlay */
        #modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; 
            display: none; align-items: flex-end;
        }
        #modal-content { 
            background: #fff; width: 100%; border-radius: 20px 20px 0 0; 
            padding: 20px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .close-btn { background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .photo-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-top: 10px; }
        .photo-grid img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #f1f5f9; }
    </style>
</head>
<body>

    <header>
        <div class="user-info">
            <div class="avatar">ZR</div>
            <div class="user-text">
                <h2>Zamir Rios</h2>
                <p>rmtech3@dossaniparadise.com</p>
            </div>
        </div>
        <div style="font-size: 10px; color: #10b981; font-weight: bold;">● LIVE</div>
    </header>

    <div class="tabs">
        <div id="tab-active" class="tab active" onclick="switchTab('active')">ACTIVE</div>
        <div id="tab-completed" class="tab" onclick="switchTab('completed')">COMPLETED</div>
    </div>

    <main>
        <div id="list-container">
            <div class="loader-container">
                <div class="spinner"></div>
                <p>Loading jobs...</p>
            </div>
        </div>
    </main>

    <div id="modal" onclick="if(event.target===this)closeModal()">
        <div id="modal-content">
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDf0W5a8UPpuZbo873nWfed6VvNExL4BjM",
            authDomain: "dossani-paradise-rm-tracker.firebaseapp.com",
            databaseURL: "https://dossani-paradise-rm-tracker-default-rtdb.firebaseio.com",
            projectId: "dossani-paradise-rm-tracker",
            storageBucket: "dossani-paradise-rm-tracker.firebasestorage.app",
            messagingSenderId: "328034984226",
            appId: "1:328034984226:web:2b2ddb58d935bec201857b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const TARGET_EMAIL = 'rmtech3@dossaniparadise.com';

        let activeTickets = [];
        let completedTickets = [];
        let currentTab = 'active';
        let completedLoaded = false;

        // Auto-auth
        auth.signInAnonymously().catch(e => console.error(e));

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-active').className = 'tab' + (tab === 'active' ? ' active' : '');
            document.getElementById('tab-completed').className = 'tab' + (tab === 'completed' ? ' active' : '');
            
            if (tab === 'completed' && !completedLoaded) {
                loadCompleted();
            } else {
                renderList();
            }
        }

        function loadActive() {
            const ref = db.ref('tickets');
            // Real-time listener for active jobs only
            ref.on('value', (snap) => {
                const data = snap.val();
                if (!data) { activeTickets = []; renderList(); return; }
                
                activeTickets = Object.entries(data)
                    .map(([key, val]) => ({ ...val, _key: key }))
                    .filter(t => 
                        t.assignedTo?.toLowerCase() === TARGET_EMAIL.toLowerCase() &&
                        ['inprogress', 'dispatched', 'assigned', 'waiting'].includes(t.status)
                    );
                
                activeTickets.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                if (currentTab === 'active') renderList();
            });
        }

        function loadCompleted() {
            completedLoaded = true;
            document.getElementById('list-container').innerHTML = '<div class="loader-container"><div class="spinner"></div><p>Loading history...</p></div>';
            
            const ref = db.ref('tickets');
            // One-time fetch for history to save memory/data
            ref.once('value').then((snap) => {
                const data = snap.val();
                if (!data) { completedTickets = []; }
                else {
                    completedTickets = Object.entries(data)
                        .map(([key, val]) => ({ ...val, _key: key }))
                        .filter(t => 
                            t.assignedTo?.toLowerCase() === TARGET_EMAIL.toLowerCase() &&
                            !['inprogress', 'dispatched', 'assigned', 'waiting'].includes(t.status)
                        );
                    completedTickets.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                }
                if (currentTab === 'completed') renderList();
            });
        }

        function renderList() {
            const container = document.getElementById('list-container');
            const list = currentTab === 'active' ? activeTickets : completedTickets;
            
            if (list.length === 0) {
                container.innerHTML = `<div class="empty">No ${currentTab} jobs found.</div>`;
                return;
            }

            container.innerHTML = list.map(t => `
                <div class="ticket-card" onclick="openModal('${t._key}', '${currentTab}')">
                    <div class="ticket-header">
                        <span class="ticket-id">${t.id || 'TKT'}</span>
                        <span class="status-badge status-${t.status}">${t.status}</span>
                    </div>
                    <h3 class="store-name">${t.storeName || 'Store'}</h3>
                    <p class="desc">${t.description || ''}</p>
                    <div class="meta">
                        <span class="priority ${t.priority === 'emergency' ? 'priority-emergency' : t.priority === 'urgent' ? 'priority-urgent' : ''}">
                            ${t.priority === 'emergency' ? '🚨' : t.priority === 'urgent' ? '⚠️' : '✅'} ${t.priority}
                        </span>
                        <span>${getTimeAgo(t.createdAt)}</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(key, type) {
            const list = type === 'active' ? activeTickets : completedTickets;
            const t = list.find(x => x._key === key);
            if (!t) return;

            const body = document.getElementById('modal-body');
            const photos = t.photos ? `<div class="photo-grid">${t.photos.map(url => `<img src="${url}" loading="lazy">`).join('')}</div>` : '';
            
            body.innerHTML = `
                <div class="modal-header">
                    <div>
                        <h2 style="margin:0;font-size:18px;">${t.storeName}</h2>
                        <p style="margin:0;font-size:12px;color:#64748b;">${t.id}</p>
                    </div>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>
                <div style="font-size:14px; color:#334155; margin-bottom:15px; white-space:pre-wrap;">${t.description}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                    <div style="background:#f8fafc; padding:10px; border-radius:8px;">
                        <div style="font-size:10px; font-weight:bold; color:#94a3b8; margin-bottom:2px;">PRIORITY</div>
                        <div style="font-weight:bold; font-size:13px;">${t.priority.toUpperCase()}</div>
                    </div>
                    <div style="background:#f8fafc; padding:10px; border-radius:8px;">
                        <div style="font-size:10px; font-weight:bold; color:#94a3b8; margin-bottom:2px;">STATUS</div>
                        <div style="font-weight:bold; font-size:13px;">${t.status.toUpperCase()}</div>
                    </div>
                </div>
                ${photos}
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function getTimeAgo(ts) {
            if (!ts) return '';
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff/60) + 'm';
            if (diff < 86400) return Math.floor(diff/3600) + 'h';
            return Math.floor(diff/86400) + 'd';
        }

        loadActive();
    </script>
</body>
</html>
