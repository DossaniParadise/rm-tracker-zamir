<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamir's Ticket Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .ticket-card:active { transform: scale(0.98); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold shadow-md shadow-blue-200">
                ZR
            </div>
            <div>
                <h2 class="font-bold text-slate-900 leading-tight">Zamir Rios</h2>
                <p class="text-xs text-slate-500">rmtech3@dossaniparadise.com</p>
            </div>
        </div>
        <div id="connection-status" class="flex items-center gap-1 text-[10px] font-bold text-emerald-500 uppercase tracking-widest">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            Live
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4 max-w-2xl mx-auto space-y-4">
        
        <!-- Stats Row -->
        <div class="grid grid-cols-2 gap-3 mb-2">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Active Jobs</p>
                <p id="active-count" class="text-2xl font-bold text-blue-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Completed</p>
                <p id="completed-count" class="text-2xl font-bold text-slate-400">0</p>
            </div>
        </div>

        <div class="flex items-center gap-2 mb-2">
            <i data-lucide="wrench" class="w-5 h-5 text-blue-600"></i>
            <h3 class="font-bold text-slate-800">Assigned Tickets</h3>
        </div>

        <!-- Ticket List Container -->
        <div id="ticket-list" class="space-y-3">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="loader mb-4"></div>
                <p>Loading tickets...</p>
            </div>
        </div>
    </main>

    <!-- Ticket Detail Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative w-full max-w-lg bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden transform transition-transform duration-300 translate-y-full" id="modal-content">
            <div class="h-1.5 w-12 bg-slate-200 rounded-full mx-auto my-3 sm:hidden"></div>
            <div class="p-6 max-h-[85vh] overflow-y-auto" id="modal-body">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDf0W5a8UPpuZbo873nWfed6VvNExL4BjM",
            authDomain: "dossani-paradise-rm-tracker.firebaseapp.com",
            databaseURL: "https://dossani-paradise-rm-tracker-default-rtdb.firebaseio.com",
            projectId: "dossani-paradise-rm-tracker",
            storageBucket: "dossani-paradise-rm-tracker.firebasestorage.app",
            messagingSenderId: "328034984226",
            appId: "1:328034984226:web:2b2ddb58d935bec201857b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const TARGET_EMAIL = 'rmtech3@dossaniparadise.com';

        // --- State ---
        let tickets = [];

        // --- Auth ---
        // Automatically sign in anonymously to bypass login screen while maintaining DB access
        auth.signInAnonymously().catch(err => console.error("Auth error:", err));

        // --- Data Fetching ---
        function loadTickets() {
            const ticketsRef = db.ref('tickets');
            ticketsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    tickets = Object.entries(data)
                        .map(([key, val]) => ({ ...val, _key: key }))
                        .filter(t => t.assignedTo?.toLowerCase() === TARGET_EMAIL.toLowerCase());
                    
                    tickets.sort((a, b) => {
                        const aActive = ['inprogress', 'dispatched', 'assigned', 'waiting'].includes(a.status);
                        const bActive = ['inprogress', 'dispatched', 'assigned', 'waiting'].includes(b.status);
                        if (aActive && !bActive) return -1;
                        if (!aActive && bActive) return 1;
                        return (b.createdAt || 0) - (a.createdAt || 0);
                    });

                    renderList();
                    updateStats();
                } else {
                    renderEmpty();
                }
            });
        }

        // --- UI Rendering ---
        function renderList() {
            const container = document.getElementById('ticket-list');
            if (tickets.length === 0) {
                renderEmpty();
                return;
            }

            container.innerHTML = tickets.map(t => {
                const statusClass = getStatusClass(t.status);
                const priorityIcon = getPriorityIcon(t.priority);
                const timeAgo = getTimeAgo(t.createdAt);
                
                return `
                    <div onclick="openModal('${t._key}')" class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm transition-all active:scale-[0.98] cursor-pointer hover:border-blue-300">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-mono text-slate-400 uppercase tracking-wider">${t.id || 'NO-ID'}</span>
                            <div class="flex items-center gap-2">
                                ${priorityIcon}
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border uppercase tracking-tighter ${statusClass}">
                                    ${t.status}
                                </span>
                            </div>
                        </div>
                        <h4 class="font-bold text-slate-900 mb-1 truncate">${t.storeName || 'Unknown Store'}</h4>
                        <p class="text-sm text-slate-600 line-clamp-2 mb-3">${t.description || 'No description'}</p>
                        <div class="flex items-center justify-between text-xs text-slate-400">
                            <div class="flex items-center gap-1">
                                <i data-lucide="map-pin" class="w-3 h-3"></i>
                                <span>${t.storeCode || ''}</span>
                            </div>
                            <span>${timeAgo}</span>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderEmpty() {
            document.getElementById('ticket-list').innerHTML = `
                <div class="bg-white rounded-2xl p-12 text-center border border-dashed border-slate-300">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                        <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                    </div>
                    <p class="text-slate-500 font-medium">No jobs assigned to you right now.</p>
                </div>
            `;
            lucide.createIcons();
        }

        function updateStats() {
            const active = tickets.filter(t => ['inprogress', 'dispatched', 'assigned', 'waiting'].includes(t.status)).length;
            const completed = tickets.filter(t => !['inprogress', 'dispatched', 'assigned', 'waiting'].includes(t.status)).length;
            document.getElementById('active-count').innerText = active;
            document.getElementById('completed-count').innerText = completed;
        }

        // --- Modal ---
        function openModal(key) {
            const t = tickets.find(x => x._key === key);
            if (!t) return;

            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            const body = document.getElementById('modal-body');

            const photosHtml = t.photos ? `
                <section>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Photos</label>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        ${t.photos.map(url => `<img src="${url}" class="w-40 h-40 object-cover rounded-xl border border-slate-200 flex-shrink-0">`).join('')}
                    </div>
                </section>
            ` : '';

            const activityHtml = t.activity ? `
                <section class="mt-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Activity History</label>
                    <div class="space-y-3">
                        ${Object.values(t.activity).reverse().map(act => `
                            <div class="flex gap-3 text-sm">
                                <div class="w-1.5 h-1.5 bg-slate-300 rounded-full mt-1.5 flex-shrink-0"></div>
                                <div>
                                    <p class="text-slate-700"><span class="font-bold">${act.by}</span> ${act.note || 'updated status'}</p>
                                    <p class="text-[10px] text-slate-400">${getTimeAgo(act.timestamp)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            ` : '';

            body.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-xl font-bold text-slate-900">${t.storeName}</h3>
                        <p class="text-sm text-slate-500">${t.id}</p>
                    </div>
                    <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200 transition-colors">✕</button>
                </div>
                <div class="space-y-6">
                    <section>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Description</label>
                        <p class="text-slate-700 leading-relaxed">${t.description}</p>
                    </section>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-3 rounded-xl">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Priority</label>
                            <div class="font-semibold text-slate-900 capitalize flex items-center gap-2">
                                ${getPriorityIcon(t.priority)} ${t.priority}
                            </div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Status</label>
                            <div class="font-semibold text-slate-900 capitalize">${t.status}</div>
                        </div>
                    </div>
                    ${photosHtml}
                    ${activityHtml}
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- Helpers ---
        function getStatusClass(status) {
            const map = {
                unassigned: 'bg-red-100 text-red-700 border-red-200',
                assigned: 'bg-purple-100 text-purple-700 border-purple-200',
                dispatched: 'bg-blue-100 text-blue-700 border-blue-200',
                inprogress: 'bg-blue-600 text-white border-blue-700',
                waiting: 'bg-amber-100 text-amber-700 border-amber-200',
                resolved: 'bg-emerald-100 text-emerald-700 border-emerald-200',
                closed: 'bg-slate-100 text-slate-700 border-slate-200',
            };
            return map[status] || 'bg-slate-100 border-slate-200';
        }

        function getPriorityIcon(p) {
            if (p === 'emergency') return '<i data-lucide="alert-circle" class="w-4 h-4 text-red-500"></i>';
            if (p === 'urgent') return '<i data-lucide="alert-circle" class="w-4 h-4 text-amber-500"></i>';
            return '<i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>';
        }

        function getTimeAgo(ts) {
            if (!ts) return '';
            const seconds = Math.floor((new Date() - ts) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m";
            return Math.floor(seconds) + "s";
        }

        // Init
        loadTickets();
    </script>
</body>
</html>
